<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>自動訪問ツール</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #222; color: white; padding-top: 50px; }
        input { width: 300px; padding: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; }
        #status { margin-top: 20px; color: #ffeb3b; }
        iframe { width: 90%; height: 500px; margin-top: 20px; background: white; border: 2px solid #444; }
    </style>
</head>
<body>

    <h1>自動アクセス・ランチャー</h1>
    <p>URLを入力して「開始」を押すと、5秒おきに更新します。</p>

    <input type="text" id="urlInput" placeholder="https://example.com">
    <button onclick="startAutoVisit()">開始</button>
    <button onclick="stopAutoVisit()" style="background:#dc3545;">停止</button>

    <div id="status">停止中</div>
    
    <iframe id="targetFrame" src="about:blank"></iframe>

    <script>
        let timer = null;
        let count = 0;

        function startAutoVisit() {
            const url = document.getElementById('urlInput').value;
            const frame = document.getElementById('targetFrame');
            const status = document.getElementById('status');

            if (!url.startsWith('http')) {
                alert("URLは http:// か https:// から入力してね！");
                return;
            }

            // すでに動いていたら一度止める
            stopAutoVisit();

            status.innerText = "実行中: 5秒ごとにアクセスしています...";
            
            // 5秒おきにiframeのsrcを更新
            timer = setInterval(() => {
                count++;
                frame.src = url + "?t=" + new Date().getTime(); // キャッシュ回避のための工夫
                status.innerText = "実行中: " + count + "回目のアクセス完了！";
            }, 5000);

            // 最初の一回をすぐ実行
            frame.src = url;
        }

        function stopAutoVisit() {
            if (timer) {
                clearInterval(timer);
                timer = null;
                document.getElementById('status').innerText = "停止しました。";
            }
        }
    </script>
</body>
</html>
